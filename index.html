async function desenharRotaReal(pontos){

    try{

        const coords = pontos
            .map(p => `${p[1]},${p[0]}`)
            .join(';');

        const url =
        `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

        const resposta = await fetch(url);

        const dados = await resposta.json();

        if(!dados.routes || !dados.routes.length){
            return;
        }

        const geo = dados.routes[0].geometry;

        const rotaLayer = L.geoJSON(geo, {
    style: {
        color: '#ff6b00',
        weight: 6,
        opacity: 0.9
    }
});

rotaLayer.addTo(layerRotas);
        

    }catch(erro){

        console.error('Erro rota:',erro);

    }

}

async function desenharTodasRotas() {

function tracarRota(destinoLat, destinoLng) {

    if (minhaLatitude === null || minhaLongitude === null) {
        alert("Aguardando localização...");
        return;
    }

    if (rotaNavegacao !== null) {
        map.removeControl(rotaNavegacao);
        rotaNavegacao = null;
    }

    rotaNavegacao = L.Routing.control({
        waypoints: [
            L.latLng(minhaLatitude, minhaLongitude),
            L.latLng(destinoLat, destinoLng)
        ],
        routeWhileDragging: false,
        addWaypoints: false,
        draggableWaypoints: false,
        show: false,
        createMarker: () => null
    }).addTo(map);
}

            ).addTo(layerLocalizacao);

            marcadorUsuario.bindPopup(`
                <div class="popup-title">
                🚛 Sua Localização
                </div>

                Latitude: ${lat.toFixed(5)}<br>
                Longitude: ${lng.toFixed(5)}
            `);

        },

        function(erro){

            console.log(
                "Geolocalização não permitida."
            );

        },

        {
            enableHighAccuracy:true,
            maximumAge:10000,
            timeout:5000
        }

    );

}

async function carregarFornecedores() {

    const resposta = await fetch("https://script.google.com/macros/s/AKfycbz-uSX665noO6AiNPkKBShfQ2qadvtN27sAVp6BA0Bfq4GMb2f3tklXihJci5IS-4pK/exec");

    const fornecedores = await resposta.json();

console.log("Total de fornecedores:", fornecedores.length);

// Lista todas as categorias existentes
const categorias = [...new Set(fornecedores.map(f => f.categoria))];
console.log("Categorias encontradas:", categorias);

fornecedores.forEach(f => {

    let layer = null;

    const categoria = (f.categoria || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[_-]/g," ")     // transforma Borracharia_Pneus em borracharia pneus
        .replace(/\s+/g," ")      // remove espaços duplicados
        .trim();

    switch(categoria){

        case "oficina":
        case "oficina diesel":
        case "oficina mecanica":
        case "mecanica diesel":
            layer = layerOficinas;
            break;

        case "borracharia":
        case "borracharia pneus":
            layer = layerBorracharias;
            break;

        case "guincho":
        case "guinchos":
            layer = layerGuinchos;
            break;

        case "posto de molas":
            layer = layerPostoMolas;
            break;

        case "recapadora":
            layer = layerRecapadoras;
            break;

        default:
            return;
    }

    function obterIcone(layer){

    if(layer === layerOficinas) return oficinaIcon;

    if(layer === layerBorracharias) return borrachariaIcon;

    if(layer === layerGuinchos) return guinchoIcon;

    if(layer === layerPostoMolas) return molasIcon;

    if(layer === layerRecapadoras) return recapadoraIcon;

    return oficinaIcon;

}

const marker = L.marker(
    [f.latitude, f.longitude],
    {
        icon: obterIcone(layer)
    }
).addTo(layer);

   marker.bindPopup(`
<div class="popup-header">
    <h3>${f.nome}</h3>
    <span class="popup-categoria">${f.categoria}</span>
</div>

<div class="popup-body">

    <b>📍 Cidade:</b> ${f.cidade}/${f.estado}<br>

    <b>📞 Telefone:</b>
    ${f.telefone ? f.telefone : "Não informado"}

    <div class="popup-acoes">

        <button class="btn-rota"
            onclick="tracarRota(${f.latitude},${f.longitude})">
            🧭 Rota
        </button>

        <button class="btn-google"
            onclick="abrirGoogleMaps(${f.latitude},${f.longitude})">
            Google
        </button>

        <button class="btn-waze"
            onclick="abrirWaze(${f.latitude},${f.longitude})">
            Waze
        </button>

    </div>

</div>
`);

});

}    
    

carregarFornecedores();    

map.on('overlayadd', function(e){

    if(e.layer === layerRotas){
        carregarRotasSeNecessario();
    }

});

console.log("PASSO FINAL");    
</script>
