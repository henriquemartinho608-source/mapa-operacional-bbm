async function desenharRotaReal(pontos){

    try{

        const coords = pontos
            .map(p => `${p[1]},${p[0]}`)
            .join(';');

        const url =
        `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

        const resposta = await fetch(url);

        const dados = await resposta.json();

        if(!dados.routes || !dados.routes.length){
            return;
        }

        const geo = dados.routes[0].geometry;

        const rotaLayer = L.geoJSON(geo,{
    style:{
        color:'#ff6b00',
        weight:6,
        opacity:0.9
    },

    onEachFeature: function(feature, layer){

        layer.on('click', function(e){

            console.log('CLIQUEI NA ROTA');

            L.DomEvent.stopPropagation(e);

            if(rotaAtual){

                rotaAtual.setStyle({
                    color:'#ff6b00',
                    weight:6,
                    opacity:0.9
                });

            }

            layer.setStyle({
                color:'#00ffff',
                weight:10,
                opacity:1
            });

            rotaAtual = layer;

        });

    }

});

rotaLayer.addTo(layerRotas);

    }catch(erro){

        console.error('Erro rota:',erro);

    }

}

async function desenharTodasRotas(){

    for(const rota of rotas){

        await desenharRotaReal(rota);

    }

}

/////////////////////////////////////////////////////
// TRAÇAR ROTA
/////////////////////////////////////////////////////

function tracarRota(destinoLat,destinoLng){

    if(minhaLatitude === null || minhaLongitude === null){

        alert("Aguardando localização...");
        return;

    }

    if(rotaAtual){

        map.removeControl(rotaAtual);

    }

    rotaAtual = L.Routing.control({

        waypoints:[

            L.latLng(minhaLatitude,minhaLongitude),
            L.latLng(destinoLat,destinoLng)

        ],

        routeWhileDragging:false,
        addWaypoints:false,
        draggableWaypoints:false,
        fitSelectedRoutes:true,

        show:false,

        createMarker: function() {
            return null;
        }

    }).addTo(map);

}

// NAVEGAÇÃO EXTERNA
/////////////////////////////////////////////////////

function abrirGoogleMaps(lat,lng){

    const url =
    `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;

    window.open(url,'_blank');

}

function abrirWaze(lat,lng){

    const url =
    `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`;

    window.open(url,'_blank');

}

// GEOLOCALIZAÇÃO
/////////////////////////////////////////////////////

let marcadorUsuario;

if (navigator.geolocation) {

    navigator.geolocation.watchPosition(

        function(posicao){

            const lat = posicao.coords.latitude;
            const lng = posicao.coords.longitude;

            minhaLatitude = lat;
            minhaLongitude = lng;

            layerLocalizacao.clearLayers();

            marcadorUsuario = L.marker(
                [lat,lng],
                {icon:minhaPosicaoIcon}
            ).addTo(layerLocalizacao);

            marcadorUsuario.bindPopup(`
                <div class="popup-title">
                🚛 Sua Localização
                </div>

                Latitude: ${lat.toFixed(5)}<br>
                Longitude: ${lng.toFixed(5)}
            `);

        },

        function(erro){

            console.log(
                "Geolocalização não permitida."
            );

        },

        {
            enableHighAccuracy:true,
            maximumAge:10000,
            timeout:5000
        }

    );

}
    
legenda.addTo(map);
